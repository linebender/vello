[package]
name = "parley_draw"
version = "0.0.0"
description = "Parley Draw provides APIs for efficiently rendering text."
keywords = ["text", "layout"]
categories = ["gui", "graphics"]
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

publish = false

[package.metadata.docs.rs]
all-features = true

[features]
default = ["std"]
std = ["vello_common/std", "skrifa/std"]
libm = ["skrifa/libm", "vello_common/libm", "dep:core_maths"]
png = ["std", "dep:png", "vello_common/png"]

[lints]
workspace = true

[dependencies]
bytemuck = { workspace = true }
foldhash = { workspace = true }
log = { workspace = true }
hashbrown = { workspace = true }
skrifa = { workspace = true }
smallvec = { workspace = true }
vello_common = { workspace = true }
png = { workspace = true, optional = true }
core_maths = { version = "0.1.1", optional = true }
